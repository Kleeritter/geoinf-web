<!doctype html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <title>Profi-Grün-Analyse (Nature-Optimized)</title>
        <style>
            body {
                font-family: sans-serif;
                background: #222;
                color: #eee;
                text-align: center;
                padding: 20px;
            }
            .box {
                background: #333;
                padding: 20px;
                border-radius: 10px;
                max-width: 900px;
                margin: auto;
            }
            canvas {
                max-width: 100%;
                border: 2px solid #555;
                margin-top: 15px;
                border-radius: 5px;
            }
            .res {
                font-size: 1.5em;
                color: #4af;
                margin: 15px 0;
            }
            .hint {
                color: #888;
                font-size: 0.8em;
            }
            #loading {
                display: none;
                color: #ff0;
            }
            .slider-container {
                margin: 20px 0;
                padding: 15px;
                background: #3a3a3a;
                border-radius: 8px;
            }
            input[type="range"] {
                width: 80%;
                margin: 10px 0;
            }
            #toleranceValue {
                color: #4af;
                font-weight: bold;
            }
            .info {
                display: flex;
                justify-content: space-between;
                margin-top: 5px;
            }
        </style>
    </head>
    <body>
        <div class="box">
            <h2>Vegetations-Analyse</h2>
            <p>Optimiert für Bäume, Nadeln und Blätter im Schatten.</p>

            <input type="file" id="imageInput" accept="image/*" />

            <div class="slider-container">
                <label for="tolerance">
                    Grün-Toleranz: <span id="toleranceValue">25</span>
                </label>
                <input
                    type="range"
                    id="tolerance"
                    min="0"
                    max="100"
                    value="25"
                    step="1"
                />
                <div class="info">
                    <span>weniger Grün</span>
                    <span>mehr Grün</span>
                </div>
            </div>

            <div id="loading">Analysiere...</div>

            <div class="res">Grünanteil: <span id="perc">0%</span></div>

            <canvas id="cvs"></canvas>

            <p class="hint">
                Pink markierte Bereiche = Als "Natur-Grün" erkannt.
            </p>
        </div>

        <script>
            const input = document.getElementById("imageInput");
            const cvs = document.getElementById("cvs");
            const ctx = cvs.getContext("2d", { willReadFrequently: true });
            const percDisp = document.getElementById("perc");
            const loading = document.getElementById("loading");
            const toleranceSlider = document.getElementById("tolerance");
            const toleranceSpan = document.getElementById("toleranceValue");

            let originalImageData = null;
            let currentImageData = null;

            function analyzeWithTolerance() {
                if (!originalImageData) return;

                const tolerance = parseInt(toleranceSlider.value);
                toleranceSpan.textContent = tolerance;

                const imgData = new ImageData(
                    new Uint8ClampedArray(originalImageData.data),
                    originalImageData.width,
                    originalImageData.height,
                );
                const data = imgData.data;

                let greenCount = 0;
                let totalOpaque = 0;

                for (let i = 0; i < data.length; i += 4) {
                    const r = originalImageData.data[i];
                    const g = originalImageData.data[i + 1];
                    const b = originalImageData.data[i + 2];
                    const a = originalImageData.data[i + 3];

                    if (a < 128) {
                        data[i] = r;
                        data[i + 1] = g;
                        data[i + 2] = b;
                        data[i + 3] = a;
                        continue;
                    }
                    totalOpaque++;

                    // Excess Green Index
                    const exg = 2 * g - r - b;

                    // Schatten-Check
                    const isDarkGreen = g > r && g > b && r + g + b > 30;

                    if (
                        exg > tolerance ||
                        (exg > tolerance * 0.2 && isDarkGreen)
                    ) {
                        greenCount++;
                        // Pinke Markierung
                        data[i] = 255;
                        data[i + 1] = 0;
                        data[i + 2] = 255;
                        data[i + 3] = 255;
                    } else {
                        data[i] = r;
                        data[i + 1] = g;
                        data[i + 2] = b;
                        data[i + 3] = a;
                    }
                }

                ctx.putImageData(imgData, 0, 0);
                currentImageData = imgData;

                const result = (greenCount / totalOpaque) * 100;
                percDisp.textContent = result.toFixed(2) + "%";
            }

            input.addEventListener("change", (e) => {
                const file = e.target.files[0];
                if (!file) return;

                loading.style.display = "block";
                const reader = new FileReader();

                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const scale = Math.min(
                            1,
                            800 / Math.max(img.width, img.height),
                        );
                        cvs.width = img.width * scale;
                        cvs.height = img.height * scale;

                        ctx.drawImage(img, 0, 0, cvs.width, cvs.height);
                        originalImageData = ctx.getImageData(
                            0,
                            0,
                            cvs.width,
                            cvs.height,
                        );

                        analyzeWithTolerance();
                        loading.style.display = "none";
                    };
                    img.src = event.target.result;
                };

                reader.readAsDataURL(file);
            });

            toleranceSlider.addEventListener("input", () => {
                if (originalImageData) analyzeWithTolerance();
            });
        </script>
    </body>
</html>
